    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return customFetch;
            },
            set: function(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Fetch safe-guard hook failed to bind:", e);
        }
      })();
    </script>
